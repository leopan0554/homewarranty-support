      <h1>支援資訊</h1>
      <p>如果你在使用家有一保時遇到問題，可以先參考下方資訊。</p>

      <h2>常見問題</h2>
      <h3>資料會同步到雲端嗎？</h3>
      <p>第一版不提供雲端同步。家電、保固與文件資料會保存在你的裝置上。</p>

      <h3>需要登入帳號嗎？</h3>
      <p>不需要。第一版可直接在裝置上使用。</p>

      <h3>保固提醒如何運作？</h3>
      <p>若你允許通知並設定保固日期，App 可使用 iOS 本機通知提醒你保固即將到期。</p>

      <h3>可以保存哪些文件？</h3>
      <p>你可以保存保證書、說明書圖片、PDF 文件，也可以保存說明書網址。</p>

      <h2>回報問題</h2>
      <p>回報問題時，請描述你使用的 iPhone 型號、iOS 版本、發生問題的畫面，以及可以重現問題的步驟。</p>
